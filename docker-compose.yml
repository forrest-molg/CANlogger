services:
  canlogger:
    build: .
    container_name: canlogger-app
    privileged: true
    environment:
      CANLOGGER_LOG_LEVEL: DEBUG
    ports:
      - "8001:8000"   # 8001 on host — avoids conflict with CANdatabase API on port 8000
    extra_hosts:
      - "host.docker.internal:host-gateway"  # lets container reach host's port 8000 (CANdatabase)
    volumes:
      - ./config:/app/config
      - ./data:/data
      - /dev/bus/usb:/dev/bus/usb
      - /run/udev:/run/udev:ro
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: canlogger-postgres
    environment:
      POSTGRES_DB: canlogger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    restart: unless-stopped

volumes:
  pg_data:
